<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Jenni Wellbeing</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the window to load the correct route.

      // This script should be placed as the 404.html file in your GitHub Pages repository.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 * (l.pathname.split('/')[1] === 'jenni-wellbeing.ch')).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(1 * (l.pathname.split('/')[1] === 'jenni-wellbeing.ch')).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
